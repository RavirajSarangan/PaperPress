<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f4fd8"/>
      <stop offset="100%" style="stop-color:#0f2a8a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid texture -->
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.05"/>

  <!-- Logo mark -->
  <rect x="60" y="58" width="76" height="76" rx="18" fill="rgba(255,255,255,0.18)" filter="url(#shadow)"/>
  <text x="98" y="116" font-family="Arial Black,Arial,sans-serif" font-size="52" font-weight="900" fill="white" text-anchor="middle">P</text>

  <!-- Brand -->
  <text x="152" y="100" font-family="Arial Black,Arial,sans-serif" font-size="44" font-weight="900" fill="white">Paper</text>
  <text x="340" y="100" font-family="Arial Black,Arial,sans-serif" font-size="44" font-weight="900" fill="rgba(255,255,255,0.55)">Press</text>
  <text x="152" y="122" font-family="Arial,sans-serif" font-size="15" fill="rgba(255,255,255,0.5)" letter-spacing="1">by VENOM X TECHNOLOGY</text>

  <!-- Headline -->
  <text x="60" y="230" font-family="Arial Black,Arial,sans-serif" font-size="72" font-weight="900" fill="white">Free Private</text>
  <text x="60" y="315" font-family="Arial Black,Arial,sans-serif" font-size="72" font-weight="900" fill="white">PDF Tools</text>

  <!-- Sub-tagline -->
  <text x="60" y="370" font-family="Arial,sans-serif" font-size="28" fill="rgba(255,255,255,0.75)">13 tools · No upload · No server · No tracking</text>

  <!-- Tool chips -->
  <rect x="60" y="418" width="148" height="42" rx="21" fill="rgba(255,255,255,0.13)"/>
  <text x="134" y="445" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">Merge PDF</text>

  <rect x="220" y="418" width="140" height="42" rx="21" fill="rgba(255,255,255,0.13)"/>
  <text x="290" y="445" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">Split PDF</text>

  <rect x="372" y="418" width="168" height="42" rx="21" fill="rgba(255,255,255,0.13)"/>
  <text x="456" y="445" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">Compress PDF</text>

  <rect x="552" y="418" width="124" height="42" rx="21" fill="rgba(255,255,255,0.13)"/>
  <text x="614" y="445" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">OCR Text</text>

  <rect x="688" y="418" width="182" height="42" rx="21" fill="rgba(255,255,255,0.13)"/>
  <text x="779" y="445" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">Organize Pages</text>

  <rect x="882" y="418" width="162" height="42" rx="21" fill="rgba(255,255,255,0.13)"/>
  <text x="963" y="445" font-family="Arial,sans-serif" font-size="18" fill="white" text-anchor="middle">Watermark PDF</text>

  <!-- No-upload badge -->
  <rect x="820" y="58" width="320" height="58" rx="29" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
  <text x="980" y="94" font-family="Arial,sans-serif" font-size="22" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1">✕ NO UPLOAD EVER</text>

  <!-- URL -->
  <text x="60" y="585" font-family="Arial,sans-serif" font-size="22" fill="rgba(255,255,255,0.5)">paperpress.venomxtechnology.com</text>

  <!-- Divider line -->
  <rect x="60" y="555" width="1080" height="1.5" fill="rgba(255,255,255,0.12)"/>
</svg>
